name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Configure SSH ──────────────────────────────────────────────────
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.HOST }}" >> ~/.ssh/known_hosts

      # ── 3. Push .env to server ────────────────────────────────────────────
      #    Written via SSH stdin — secret values never appear in shell history.
      - name: Push .env file to server
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              "${{ secrets.USERNAME }}@${{ secrets.HOST }}" \
              'cat > /home/${{ secrets.USERNAME }}/luvira-guardian/.env' << 'ENVEOF'
          AUTH0_DOMAIN=${{ secrets.AUTH0_DOMAIN }}
          AUTH0_AUDIENCE=${{ secrets.AUTH0_AUDIENCE }}
          AUTH0_CLIENT_ID=${{ secrets.AUTH0_CLIENT_ID }}
          AUTH0_CLIENT_SECRET=${{ secrets.AUTH0_CLIENT_SECRET }}
          AUTH0_ISSUER=${{ secrets.AUTH0_ISSUER }}
          AUTH0_MGMT_API_AUDIENCE=${{ secrets.AUTH0_MGMT_API_AUDIENCE }}
          AUTH0_TV_CLIENT_ID=${{ secrets.AUTH0_TV_CLIENT_ID }}
          AUTH0_TV_CLIENT_SECRET=${{ secrets.AUTH0_TV_CLIENT_SECRET }}
          APP_ENV=${{ secrets.APP_ENV }}
          APP_BASE_URL=${{ secrets.APP_BASE_URL }}
          FRONTEND_BASE_URL=${{ secrets.FRONTEND_BASE_URL }}
          LOG_LEVEL=${{ secrets.LOG_LEVEL }}
          GITLAB_BASE_URL=${{ secrets.GITLAB_BASE_URL }}
          SLACK_API_BASE_URL=${{ secrets.SLACK_API_BASE_URL }}
          GOOGLE_API_BASE_URL=${{ secrets.GOOGLE_API_BASE_URL }}
          ENVEOF

      # ── 4. Deploy ─────────────────────────────────────────────────────────
      - name: Deploy application
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              "${{ secrets.USERNAME }}@${{ secrets.HOST }}" << 'SSHEOF'

            set -euo pipefail

            APP_DIR="/home/luvira_admin/luvira-guardian"
            IMAGE="luvira-guardian-api:latest"
            CONTAINER="luvira-guardian-api"

            echo "==> Pulling latest code..."
            cd "$APP_DIR"
            git pull origin main

            echo "==> Building Docker image..."
            docker build -f backend/Dockerfile -t "$IMAGE" backend/

            echo "==> Replacing container..."
            docker stop "$CONTAINER" 2>/dev/null || true
            docker rm   "$CONTAINER" 2>/dev/null || true

            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              -p 8000:8000 \
              --env-file "$APP_DIR/.env" \
              "$IMAGE"

            echo "==> Pruning dangling images..."
            docker image prune -f

            echo "==> Container status:"
            docker ps --filter "name=$CONTAINER"

          SSHEOF

      # ── 5. Health check ───────────────────────────────────────────────────
      - name: Health check
        run: |
          sleep 8
          curl --fail --silent --show-error \
            "http://${{ secrets.HOST }}:8000/health"
