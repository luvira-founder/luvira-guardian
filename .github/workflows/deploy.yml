name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Configure SSH ──────────────────────────────────────────────────
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.HOST }}" >> ~/.ssh/known_hosts

      # ── 3. Deploy ─────────────────────────────────────────────────────────
      - name: Deploy application
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              "${{ secrets.USERNAME }}@${{ secrets.HOST }}" << 'SSHEOF'

            set -euo pipefail

            APP_DIR="/home/luvira_admin/luvira-guardian"
            IMAGE="luvira-guardian-api:latest"
            CONTAINER="luvira-guardian-api"

            echo "==> Pulling latest code..."
            cd "$APP_DIR"
            git pull origin main

            echo "==> Building Docker image..."
            docker build -f backend/Dockerfile -t "$IMAGE" backend/

            echo "==> Replacing container..."
            docker stop "$CONTAINER" 2>/dev/null || true
            docker rm   "$CONTAINER" 2>/dev/null || true

            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              -p 8001:8000 \
              --env-file "$APP_DIR/.env" \
              "$IMAGE"

            echo "==> Pruning dangling images..."
            docker image prune -f

            echo "==> Container status:"
            docker ps --filter "name=$CONTAINER"

          SSHEOF

      # ── 5. Health check ───────────────────────────────────────────────────
      - name: Health check
        run: |
          sleep 8
          curl --fail --silent --show-error \
            "http://${{ secrets.HOST }}:8001/health"
